<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Join Prime Authority</title>

<link rel="stylesheet" href="style.css"><link rel="stylesheet" href="modal.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&display=swap" rel="stylesheet">

</head>

<body>

<header>

<nav class="navbar">

<div class="logo">
PRIME AUTHORITY
</div>

<ul class="menu">
<li><a href="notifications.html" class="notification-link">🔔<span class="badge">0</span></a></li>
</ul>

</nav>

</header>

<section class="recruitment">

<div id="joinBanner" class="join-banner"></div>
<div id="joinComingSoon" style="display:none; text-align:center; margin-bottom:24px; color:#fff; font-size:16px; border:1px solid rgba(255,255,255,0.08); padding:18px; border-radius:12px; background:rgba(255,255,255,0.04);">
  Join applications are currently closed by the admin. Please check back later.
</div>

<h1>TEAM RECRUITMENT FORM</h1>

<p class="join-text">
Complete all details carefully. Our management team will review your application.
</p>

<form id="joinForm" class="join-form">

<input
type="text"
id="teamName"
placeholder="Team Name"
required>

<label style="color:#fff; font-size:14px; margin-top:10px; display:block;">Team Logo (Required)</label>
<input
type="file"
id="teamLogo"
accept="image/*"
required>
<div id="logoPreviewContainer" style="display:none; margin-top:16px; padding:16px; background:linear-gradient(135deg, #1a1a1a 0%, #222226 100%); border-radius:12px; border:2px solid #ff2b2b; box-shadow:0 4px 12px rgba(255, 43, 43, 0.15);">
  <p style="color:#ff2b2b; font-size:12px; font-weight:600; margin:0 0 10px 0; text-transform:uppercase; letter-spacing:0.5px;">✓ Logo Preview</p>
  <div style="display:flex; align-items:center; gap:12px;">
    <img id="logoPreview" src="" alt="Logo preview" style="width:80px; height:80px; object-fit:cover; border-radius:8px; border:1px solid #ff2b2b; background:#0f0f17;">
    <div>
      <p id="logoFileName" style="color:#fff; font-size:13px; font-weight:600; margin:0 0 4px 0; word-break:break-word;">Logo selected</p>
      <p style="color:#888; font-size:11px; margin:0;">Ready to upload</p>
    </div>
  </div>
</div>

<input
type="text"
id="teamRegion"
placeholder="Team Region/State"
required>

<input
type="text"
id="managerIgn"
placeholder="Team Manager / In Game Name (IGN)"
required>

<input
type="text"
id="managerFullName"
placeholder="Team Manager / IGL Full Name (Optional)">

<select id="totalPlayers" required>
  <option value="">Total Players In Team</option>
  <option value="4">4</option>
  <option value="5">5</option>
</select>

<input
type="text"
id="previousOrganization"
placeholder="Previous Organization (Optional)">

<select id="tournamentExperience" required>

<option value="">Tournament Experience (Yes/No)</option>

<option>Yes</option>

<option>No</option>

</select>

<input
 type="number"
 id="bestTournamentResult"
 placeholder="Player UID"
 required
 inputmode="numeric">
<select id="preferredPlayTime" required>

<option value="">Preferred Play Time</option>

<option>1-3hr.</option>

<option>3-5hr.</option>

<option>5-8hr.</option>

<option>8hr.+</option>

</select>

<input
 type="tel"
 id="whatsappContact"
 placeholder="WhatsApp Contact Number"
 required
 pattern="^\+?\d{10,12}$"
 inputmode="numeric"
 value="+91">

<input
 type="email"
 id="emailAddress"
 placeholder="Email Address"
 required>

<div class="consent-group">
<label class="consent-item">
<input type="checkbox" id="detailsConfirm" required>
<span>I confirm all details are correct.</span>
</label>
<label class="consent-item">
<input type="checkbox" id="rulesAgree" required>
<span>I agree to PRIME AUTHORITY Tournament Rules & Regulations.</span>
</label>
</div>

<button type="submit">
APPLY NOW
</button>

</form>

</section>

<script src="loading.js" defer></script>
<script src="modal.js" defer></script>
<script type="module" src="join.js"></script>
<script type="module" src="script.js"></script>

</body>
</html>
