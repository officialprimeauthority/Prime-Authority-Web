<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password | Prime Authority</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .reset-section {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px 20px;
      background: linear-gradient(rgba(0,0,0,.95), rgba(0,0,0,.95)), 
                  url("https://images.unsplash.com/photo-1542751371-adc38448a05e?auto=format&fit=crop&w=1600&q=80");
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
    }

    .reset-container {
      background: rgba(20, 20, 20, 0.95);
      backdrop-filter: blur(10px);
      border: 2px solid rgba(255, 43, 43, 0.3);
      border-radius: 15px;
      padding: 50px 40px;
      width: 100%;
      max-width: 450px;
      box-shadow: 0 8px 32px rgba(255, 43, 43, 0.1);
      animation: slideUp 0.6s ease;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .reset-header {
      text-align: center;
      margin-bottom: 40px;
    }

    .reset-header h1 {
      color: #ff2b2b;
      font-size: 32px;
      margin-bottom: 10px;
      text-shadow: 0 0 20px rgba(255, 43, 43, 0.3);
      font-weight: 900;
      letter-spacing: 1px;
    }

    .reset-header p {
      color: #aaa;
      font-size: 14px;
      font-weight: 600;
    }

    .form-group {
      margin-bottom: 25px;
    }

    label {
      display: block;
      margin-bottom: 10px;
      color: #fff;
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    input[type="password"],
    input[type="text"] {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid rgba(255, 43, 43, 0.2);
      border-radius: 8px;
      font-size: 14px;
      font-family: 'Poppins', sans-serif;
      background: rgba(255, 255, 255, 0.05);
      color: #fff;
      transition: all 0.3s ease;
    }

    input[type="password"]::placeholder,
    input[type="text"]::placeholder {
      color: #666;
    }

    input[type="password"]:focus,
    input[type="text"]:focus {
      outline: none;
      border-color: #ff2b2b;
      background: rgba(255, 43, 43, 0.05);
      box-shadow: 0 0 20px rgba(255, 43, 43, 0.2);
    }

    .password-strength {
      display: none;
    }

    .password-strength-bar {
      display: none;
    }

    .password-strength-text {
      display: none;
    }

    .toggle-password {
      position: relative;
    }

    .toggle-password button {
      position: absolute;
      right: 14px;
      top: 40px;
      background: none;
      border: none;
      cursor: pointer;
      color: #ff2b2b;
      font-size: 18px;
      transition: all 0.2s;
    }

    .toggle-password button:hover {
      text-shadow: 0 0 10px rgba(255, 43, 43, 0.5);
    }

    .checkbox-group {
      margin: 20px 0 25px 0;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #showPassword {
      width: 18px;
      height: 18px;
      cursor: pointer;
      accent-color: #ff2b2b;
    }

    .checkbox-label {
      color: #aaa;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin: 0;
    }

    .submit-btn {
      width: 100%;
      padding: 14px;
      background: #ff2b2b;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 10px;
      font-family: 'Poppins', sans-serif;
    }

    .submit-btn:hover:not(:disabled) {
      transform: translateY(-3px);
      box-shadow: 0 10px 30px rgba(255, 43, 43, 0.4);
      text-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
    }

    .submit-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .alert {
      padding: 14px 16px;
      border-radius: 8px;
      margin-bottom: 25px;
      display: none;
      font-size: 13px;
      font-weight: 600;
      border-left: 4px solid transparent;
    }

    .alert.success {
      background: rgba(76, 175, 80, 0.15);
      color: #4caf50;
      border-left-color: #4caf50;
    }

    .alert.error {
      background: rgba(255, 43, 43, 0.15);
      color: #ff7b7b;
      border-left-color: #ff2b2b;
      display: block;
    }

    .alert.warning {
      background: rgba(255, 152, 0, 0.15);
      color: #ffb74d;
      border-left-color: #ff9800;
    }

    .loading {
      display: none;
      text-align: center;
      margin-top: 20px;
    }

    .spinner {
      display: inline-block;
      width: 24px;
      height: 24px;
      border: 3px solid rgba(255, 43, 43, 0.2);
      border-top-color: #ff2b2b;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .loading p {
      margin-top: 12px;
      color: #aaa;
      font-size: 13px;
      font-weight: 600;
    }

    .back-link {
      text-align: center;
      margin-top: 25px;
    }

    .back-link a {
      color: #ff2b2b;
      text-decoration: none;
      font-size: 13px;
      font-weight: 700;
      transition: all 0.3s;
    }

    .back-link a:hover {
      text-shadow: 0 0 10px rgba(255, 43, 43, 0.5);
      transform: translateX(5px);
      display: inline-block;
    }

    .back-link p {
      color: #aaa;
      margin-bottom: 12px;
      font-size: 13px;
    }

    .error-details {
      margin-top: 25px;
      padding: 16px;
      background: rgba(255, 43, 43, 0.1);
      border-left: 4px solid #ff2b2b;
      border-radius: 8px;
      display: none;
    }

    .error-details p {
      font-size: 13px;
      color: #bbb;
      margin-bottom: 12px;
      font-weight: 600;
    }

    .error-details p strong {
      color: #ff7b7b;
    }

    .error-details a {
      color: #ff2b2b;
      text-decoration: none;
      font-size: 13px;
      font-weight: 700;
      transition: all 0.2s;
    }

    .error-details a:hover {
      text-shadow: 0 0 10px rgba(255, 43, 43, 0.5);
    }

    /* Responsive */
    @media (max-width: 600px) {
      .reset-container {
        padding: 35px 25px;
        border-radius: 10px;
      }

      .reset-header h1 {
        font-size: 26px;
      }

      .reset-section {
        padding: 20px 15px;
      }
    }
  </style>
</head>
<body>
  <section class="reset-section">
    <div class="reset-container">
      <div class="reset-header">
        <h1>🔐 RESET PASSWORD</h1>
        <p>Enter your new password</p>
      </div>

      <div id="alertBox" class="alert"></div>

      <form id="resetForm">
        <div class="form-group">
          <label for="newPassword">Enter New Password *</label>
          <input 
            type="password" 
            id="newPassword" 
            placeholder="••••••••" 
            required
            minlength="6"
            autocomplete="new-password"
          >
        </div>

        <div class="form-group">
          <label for="confirmPassword">Re-enter Password *</label>
          <input 
            type="password" 
            id="confirmPassword" 
            placeholder="••••••••" 
            required
            minlength="6"
            autocomplete="new-password"
          >
        </div>

        <div class="checkbox-group">
          <input type="checkbox" id="showPassword" onchange="toggleAllPasswords()">
          <label for="showPassword" class="checkbox-label">Show Password</label>
        </div>

        <button type="submit" class="submit-btn" id="submitBtn">DONE</button>

        <div class="loading" id="loading">
          <div class="spinner"></div>
          <p>Processing...</p>
        </div>
      </form>

      <div class="error-details" id="errorDetails">
        <p><strong>⚠️ Invalid or Expired Link</strong></p>
        <p>The password reset link has expired or is invalid.</p>
        <p style="margin-bottom: 0;">Request a new one:</p>
        <a href="forgot-password.html">← Back to Reset Link Page</a>
      </div>

      <div class="back-link" id="backLink" style="display: none;">
        <p>✅ Password reset successfully!</p>
        <a href="index.html">← Back to Home</a>
      </div>
    </div>
  </section>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
    import { getAuth, confirmPasswordReset, verifyPasswordResetCode } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-auth.js";

    // Firebase config
    const firebaseConfig = {
      apiKey: "AIzaSyBm6V2_CR2GnD7hZC27VSJnL-zdbxAERkg",
      authDomain: "prime-authority.firebaseapp.com",
      projectId: "prime-authority-28e50",
      storageBucket: "prime-authority-28e50.appspot.com",
      messagingSenderId: "866606231976",
      appId: "1:866606231976:web:8ff556f1bb37cb0f39e08d"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    let oobCode = null;

    function getOobCode() {
      const params = new URLSearchParams(window.location.search);
      return params.get('oobCode');
    }

    async function verifyCode() {
      oobCode = getOobCode();
      
      if (!oobCode) {
        showAlert('Invalid or missing reset link. Please request a new one.', 'error');
        document.getElementById('errorDetails').style.display = 'block';
        document.getElementById('resetForm').style.display = 'none';
        return;
      }

      try {
        await verifyPasswordResetCode(auth, oobCode);
        console.log('✅ Password reset code verified successfully');
      } catch (error) {
        console.error('❌ Code verification failed:', error.message);
        showAlert('This password reset link has expired or is invalid.', 'error');
        document.getElementById('errorDetails').style.display = 'block';
        document.getElementById('resetForm').style.display = 'none';
      }
    }

    function showAlert(message, type) {
      const alertBox = document.getElementById('alertBox');
      alertBox.textContent = message;
      alertBox.className = `alert ${type}`;
    }

    window.togglePassword = function(fieldId) {
      const field = document.getElementById(fieldId);
      field.type = field.type === 'password' ? 'text' : 'password';
    };

    window.toggleAllPasswords = function() {
      const showCheckbox = document.getElementById('showPassword');
      const newPasswordField = document.getElementById('newPassword');
      const confirmPasswordField = document.getElementById('confirmPassword');
      
      if (showCheckbox.checked) {
        newPasswordField.type = 'text';
        confirmPasswordField.type = 'text';
      } else {
        newPasswordField.type = 'password';
        confirmPasswordField.type = 'password';
      }
    };

    document.getElementById('newPassword').addEventListener('input', function() {
      const password = this.value;
      let strength = 0;
      let text = '';
      let color = '';

      if (password.length >= 6) strength += 25;
      if (password.length >= 8) strength += 25;
      if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength += 25;
      if (/\d/.test(password) && /[!@#$%^&*]/.test(password)) strength += 25;

      if (strength < 50) {
        text = 'WEAK';
        color = '#ff7b7b';
      } else if (strength < 75) {
        text = 'FAIR';
        color = '#ffb74d';
      } else {
        text = 'STRONG';
        color = '#4caf50';
      }

      const bar = document.getElementById('strengthBar');
      bar.style.width = strength + '%';
      bar.style.backgroundColor = color;
      document.getElementById('strengthText').textContent = text;
    });

    document.getElementById('resetForm').addEventListener('submit', async function(e) {
      e.preventDefault();

      const newPassword = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      if (newPassword.length < 6) {
        showAlert('Password must be at least 6 characters long.', 'error');
        return;
      }

      if (newPassword !== confirmPassword) {
        showAlert('Passwords do not match. Please try again.', 'error');
        return;
      }

      if (!oobCode) {
        showAlert('Invalid reset link. Please request a new one.', 'error');
        return;
      }

      document.getElementById('submitBtn').disabled = true;
      document.getElementById('loading').style.display = 'block';

      try {
        await confirmPasswordReset(auth, oobCode, newPassword);
        
        console.log('✅ Password reset successfully!');
        showAlert('✅ Password reset successfully! Redirecting...', 'success');
        
        document.getElementById('resetForm').style.display = 'none';
        document.getElementById('loading').style.display = 'none';
        document.getElementById('backLink').style.display = 'block';

        setTimeout(() => {
          window.location.href = 'index.html';
        }, 2000);

      } catch (error) {
        console.error('❌ Password reset error:', error.message);
        document.getElementById('submitBtn').disabled = false;
        document.getElementById('loading').style.display = 'none';

        if (error.code === 'auth/expired-action-code') {
          showAlert('This reset link has expired. Please request a new one.', 'error');
          document.getElementById('errorDetails').style.display = 'block';
          document.getElementById('resetForm').style.display = 'none';
        } else if (error.code === 'auth/invalid-action-code') {
          showAlert('Invalid reset link. Please request a new one.', 'error');
          document.getElementById('errorDetails').style.display = 'block';
          document.getElementById('resetForm').style.display = 'none';
        } else {
          showAlert(`Error: ${error.message}`, 'error');
        }
      }
    });

    verifyCode();
  </script>
</body>
</html>
