<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password | Prime Authority</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    :root {
      color-scheme: dark;
      --bg: #050505;
      --panel: linear-gradient(135deg, rgba(26, 8, 8, 0.99), rgba(10, 2, 2, 0.97));
      --border: rgba(255, 43, 43, 0.32);
      --text: #ffffff;
      --muted: #e0b8b8;
      --accent: #ff2b2b;
      --accent-2: #ff5a3c;
      --accent-soft: rgba(255, 43, 43, 0.16);
      --danger: #ff5b7a;
      --success: #36d399;
      --shadow: 0 22px 70px rgba(0, 0, 0, 0.38);
    }

    .reset-section {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px 20px;
      background: linear-gradient(135deg, rgba(255, 43, 43, 0.12), transparent 40%), var(--bg);
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
    }

    .reset-container {
      background: var(--panel);
      backdrop-filter: blur(14px);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 48px 36px;
      width: 100%;
      max-width: 460px;
      box-shadow: var(--shadow);
      animation: slideUp 0.6s ease;
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .reset-container::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, transparent 0%, rgba(255, 43, 43, 0.1) 45%, transparent 100%);
      pointer-events: none;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .reset-header { text-align: center; margin-bottom: 32px; position: relative; z-index: 1; }
    .reset-header .brand-tag {
      display: inline-block;
      margin-bottom: 10px;
      padding: 6px 10px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.2px;
      text-transform: uppercase;
    }
    .reset-header h1 {
      color: #fff;
      font-size: 30px;
      margin: 0 0 8px;
      font-weight: 800;
      letter-spacing: 1px;
      text-transform: uppercase;
      text-shadow: 0 0 18px rgba(255, 43, 43, 0.2);
    }
    .reset-header p { color: #f2c6c6; font-size: 14px; font-weight: 600; margin: 0; }

    .form-group { margin-bottom: 20px; }
    label {
      display: block;
      margin-bottom: 10px;
      color: var(--text);
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 0.6px;
      text-transform: uppercase;
    }

    input[type="password"], input[type="text"] {
      width: 100%;
      padding: 13px 15px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 12px;
      font-size: 14px;
      font-family: 'Poppins', sans-serif;
      background: rgba(255, 255, 255, 0.05);
      color: var(--text);
      transition: all 0.3s ease;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.02);
    }
    input[type="password"]::placeholder, input[type="text"]::placeholder { color: #6f7c95; }
    input[type="password"]:focus, input[type="text"]:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(255, 43, 43, 0.16);
      background: rgba(255, 43, 43, 0.06);
    }

    .checkbox-group { margin: 18px 0 24px; display: flex; align-items: center; gap: 10px; }
    #showPassword {
      width: 16px; height: 16px; cursor: pointer; accent-color: var(--accent);
    }
    .checkbox-label { color: var(--muted); font-size: 13px; font-weight: 600; cursor: pointer; margin: 0; }

    .submit-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 8px;
      font-family: 'Poppins', sans-serif;
      box-shadow: 0 10px 30px rgba(255, 43, 43, 0.22);
    }
    .submit-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 14px 34px rgba(255, 43, 43, 0.3); }
    .submit-btn:disabled { opacity: 0.7; cursor: wait; }

    .alert {
      padding: 12px 14px;
      border-radius: 10px;
      margin-bottom: 20px;
      display: none;
      font-size: 13px;
      font-weight: 600;
      border-left: 4px solid transparent;
    }
    .alert.success {
      display: block;
      background: rgba(54, 211, 153, 0.15);
      color: var(--success);
      border-left-color: var(--success);
    }
    .alert.error {
      display: block;
      background: rgba(255, 91, 122, 0.15);
      color: var(--danger);
      border-left-color: var(--danger);
    }
    .loading { display: none; text-align: center; margin-top: 18px; }
    .spinner {
      display: inline-block;
      width: 24px; height: 24px;
      border: 3px solid rgba(255,255,255,0.18);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading p { margin-top: 10px; color: var(--muted); font-size: 13px; font-weight: 600; }

    .back-link { text-align: center; margin-top: 24px; }
    .back-link a { color: var(--accent); text-decoration: none; font-size: 13px; font-weight: 700; }
    .back-link a:hover { text-decoration: underline; }
    .back-link p { color: var(--muted); margin-bottom: 10px; font-size: 13px; }

    .error-details {
      margin-top: 24px; padding: 14px; background: rgba(255, 91, 122, 0.12); border-left: 4px solid var(--danger); border-radius: 10px; display: none;
    }
    .error-details p { font-size: 13px; color: #d8dee9; margin-bottom: 10px; font-weight: 600; }
    .error-details p strong { color: #ffb0bf; }
    .error-details a { color: var(--accent); text-decoration: none; font-size: 13px; font-weight: 700; }

    @media (max-width: 600px) {
      .reset-container { padding: 32px 22px; border-radius: 14px; }
      .reset-header h1 { font-size: 24px; }
      .reset-section { padding: 20px 14px; }
    }
  </style>
</head>
<body>
  <section class="reset-section">
    <div class="reset-container">
      <div class="reset-header">
        <div class="brand-tag">Prime Authority</div>
        <h1>Reset Password</h1>
        <p>Set a new password for your account</p>
      </div>

      <div id="alertBox" class="alert"></div>

      <form id="resetForm">
        <div class="form-group">
          <label for="newPassword">Enter New Password *</label>
          <input 
            type="password" 
            id="newPassword" 
            placeholder="••••••••" 
            required
            minlength="6"
            autocomplete="new-password"
          >
        </div>

        <div class="form-group">
          <label for="confirmPassword">Re-enter Password *</label>
          <input 
            type="password" 
            id="confirmPassword" 
            placeholder="••••••••" 
            required
            minlength="6"
            autocomplete="new-password"
          >
        </div>

        <div class="checkbox-group">
          <input type="checkbox" id="showPassword" onchange="toggleAllPasswords()">
          <label for="showPassword" class="checkbox-label">Show Password</label>
        </div>

        <button type="submit" class="submit-btn" id="submitBtn">DONE</button>

        <div class="loading" id="loading">
          <div class="spinner"></div>
          <p>Processing...</p>
        </div>
      </form>

      <div class="error-details" id="errorDetails">
        <p><strong>⚠️ Invalid or Expired Link</strong></p>
        <p>The password reset link has expired or is invalid.</p>
        <p style="margin-bottom: 0;">Request a new one:</p>
        <a href="forgot-password.html">← Back to Reset Link Page</a>
      </div>

      <div class="back-link" id="backLink" style="display: none;">
        <p>✅ Password reset successfully!</p>
        <a href="index.html">← Back to Home</a>
      </div>
    </div>
  </section>

  <script type="module">
    import { auth } from './firebase.js';
    import { confirmPasswordReset, verifyPasswordResetCode } from 'https://www.gstatic.com/firebasejs/12.1.0/firebase-auth.js';

    const resetForm = document.getElementById('resetForm');
    const alertBox = document.getElementById('alertBox');
    const submitBtn = document.getElementById('submitBtn');
    const loading = document.getElementById('loading');
    const errorDetails = document.getElementById('errorDetails');
    const backLink = document.getElementById('backLink');
    const newPasswordInput = document.getElementById('newPassword');
    const confirmPasswordInput = document.getElementById('confirmPassword');
    const showPasswordCheckbox = document.getElementById('showPassword');

    let oobCode = null;

    function getOobCode() {
      const params = new URLSearchParams(window.location.search);
      return params.get('oobCode');
    }

    function showAlert(message, type = 'error') {
      alertBox.textContent = message;
      alertBox.className = `alert ${type}`;
    }

    function clearAlert() {
      alertBox.textContent = '';
      alertBox.className = 'alert';
    }

    function setLoading(isLoading) {
      loading.style.display = isLoading ? 'block' : 'none';
      submitBtn.disabled = isLoading;
      submitBtn.textContent = isLoading ? 'PROCESSING...' : 'DONE';
    }

    window.toggleAllPasswords = function() {
      const show = showPasswordCheckbox.checked;
      newPasswordInput.type = show ? 'text' : 'password';
      confirmPasswordInput.type = show ? 'text' : 'password';
    };

    async function verifyCode() {
      oobCode = getOobCode();

      if (!oobCode) {
        showAlert('Invalid or missing reset link. Please request a new one.', 'error');
        errorDetails.style.display = 'block';
        resetForm.style.display = 'none';
        return;
      }

      try {
        await verifyPasswordResetCode(auth, oobCode);
        showAlert('Reset link verified. Enter your new password.', 'success');
      } catch (error) {
        console.error(error);
        showAlert('This password reset link has expired or is invalid.', 'error');
        errorDetails.style.display = 'block';
        resetForm.style.display = 'none';
      }
    }

    resetForm.addEventListener('submit', async function(e) {
      e.preventDefault();
      clearAlert();

      const newPassword = newPasswordInput.value.trim();
      const confirmPassword = confirmPasswordInput.value.trim();

      if (!newPassword || !confirmPassword) {
        showAlert('Please fill both password fields.', 'error');
        return;
      }

      if (newPassword.length < 6) {
        showAlert('Password must be at least 6 characters long.', 'error');
        return;
      }

      if (newPassword !== confirmPassword) {
        showAlert('Passwords do not match. Please try again.', 'error');
        return;
      }

      if (!oobCode) {
        showAlert('Invalid reset link. Please request a new one.', 'error');
        return;
      }

      setLoading(true);

      try {
        await confirmPasswordReset(auth, oobCode, newPassword);
        showAlert('Password reset successful! Redirecting to login...', 'success');
        resetForm.style.display = 'none';
        backLink.style.display = 'block';
        setTimeout(() => {
          window.location.href = 'index.html?auth=login';
        }, 1400);
      } catch (error) {
        console.error(error);
        const message = error?.code === 'auth/weak-password'
          ? 'Password is too weak. Please choose a stronger password.'
          : error?.code === 'auth/expired-action-code'
            ? 'This reset link has expired. Please request a new one.'
            : error?.code === 'auth/invalid-action-code'
              ? 'This reset link is invalid. Please request a new one.'
              : error?.message || 'Unable to reset password right now. Please try again.';
        showAlert(message, 'error');
      } finally {
        setLoading(false);
      }
    });

    verifyCode();
  </script>
</body>
</html>
