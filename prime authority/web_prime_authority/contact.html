<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact | Prime Authority</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="modal.css">
</head>

<body>

<header>
<nav class="navbar">

<h1 class="logo">PRIME AUTHORITY</h1>

<ul class="menu">
<li><a href="notifications.html" class="notification-link">🔔<span class="badge">0</span></a></li>
</ul>

</nav>
</header>

<section class="about">

<h1>CONTACT PRIME AUTHORITY</h1>

<div class="contact-info-list">
  <div class="contact-info-item">
    <span class="contact-icon">📸</span>
    <span><strong>Instagram</strong><br><span class="contact-meta">Coming Soon</span></span>
  </div>

  <a class="contact-info-item" href="https://whatsapp.com/channel/0029Vb7JsfwGZNCmkbNDw73c" target="_blank" rel="noopener noreferrer">
    <span class="contact-icon">💬</span>
    <span><strong>WhatsApp Channel</strong><br><span class="contact-meta">Click Here</span></span>
  </a>

  <div class="contact-form-card">
    <h3>CONTACT US</h3>
    <form id="contactForm" class="contact-form">
      <div class="contact-form-grid">
        <label>Full Name *
          <input type="text" id="contactFullName" required>
        </label>
        <label>Email Address *
          <input type="email" id="contactEmail" required>
        </label>
        <label>Mobile Number *
          <input type="tel" id="contactMobile" required>
        </label>
        <label>Subject *
          <input type="text" id="contactSubject" required>
        </label>
        <label>Organization / Team Name (Optional)
          <input type="text" id="contactOrganization">
        </label>
        <label>Category *
          <select id="contactCategory" required>
            <option value="">Select Category</option>
            <option value="General Inquiry">General Inquiry</option>
            <option value="Tournament Support">Tournament Support</option>
            <option value="Recruitment">Recruitment</option>
            <option value="Partnership / Sponsorship">Partnership / Sponsorship</option>
            <option value="Report a Problem">Report a Problem</option>
            <option value="Other">Other</option>
          </select>
        </label>
      </div>

      <div id="contactMessageWrap" class="contact-field hidden">
        <label>Message *</label>
        <textarea id="contactMessage" rows="5"></textarea>
      </div>

      <button type="submit" class="btn contact-submit">Send</button>
    </form>
  </div>
</div>

</section>

<script src="modal.js"></script>
<script type="module" src="script.js"></script>

</body>
</html>
