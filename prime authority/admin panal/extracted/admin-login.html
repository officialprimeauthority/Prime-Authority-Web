<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Access - Prime Authority</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="modal.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            min-height: 100vh;
            background: #0b0b0b;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            font-family: 'Poppins', sans-serif;
        }
        
        .login-container {
            background: #111;
            border: 1px solid #222;
            border-radius: 16px;
            padding: 50px 40px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        
        .emoji-shield {
            font-size: 40px;
            margin-bottom: 10px;
        }
        
        h1 {
            color: #ff2b2b;
            font-weight: 900;
            font-size: 1.6rem;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }
        
        .subtitle {
            color: #666;
            font-size: 13px;
            margin-bottom: 30px;
        }
        
        .error {
            background: rgba(255, 43, 43, 0.1);
            border: 1px solid rgba(255, 43, 43, 0.3);
            border-radius: 8px;
            padding: 10px 15px;
            margin-bottom: 20px;
            display: none;
        }
        
        .error.show {
            display: block;
        }
        
        .error-text {
            color: #ff2b2b;
            font-size: 13px;
        }
        
        form {
            display: flex;
            flex-direction: column;
        }
        
        input {
            width: 100%;
            padding: 13px 15px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            font-family: 'Poppins', sans-serif;
            margin-bottom: 14px;
            outline: none;
            transition: border-color 0.2s;
        }
        
        input:focus {
            border-color: #ff2b2b;
        }
        
        button {
            width: 100%;
            padding: 14px;
            background: #ff2b2b;
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            transition: background 0.2s;
        }
        
        button:hover:not(:disabled) {
            background: #e81e1e;
        }

        .password-field {
            position: relative;
            width: 100%;
        }

        .password-field input {
            padding-right: 56px;
        }

        .password-toggle {
            position: absolute;
            top: 50%;
            right: 12px;
            transform: translateY(-50%);
            border: 1px solid rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.04);
            color: #ff2b2b;
            cursor: pointer;
            font-size: 18px;
            padding: 8px;
            border-radius: 50%;
            width: 38px;
            height: 38px;
            display: grid;
            place-items: center;
        }
        
        button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="emoji-shield">🛡️</div>
        <h1>ADMIN ACCESS</h1>
        <p class="subtitle">Prime Authority Admin Panel</p>
        
        <div class="error" id="errorDiv">
            <p class="error-text" id="errorMsg"></p>
        </div>
        
        <form id="loginForm">
            <input type="email" id="email" placeholder="Admin Email" required>
            <div class="password-field">
                <input type="password" id="password" placeholder="Password" required>
                <button type="button" id="togglePassword" class="password-toggle" aria-label="Show password">👁️</button>
            </div>
            <button type="submit" id="loginBtn">LOGIN</button>
        </form>
    </div>
    
    <script src="firebase.js"></script>
    <script src="modal.js"></script>
    <script src="admin-panel.js"></script>
</body>
</html>
