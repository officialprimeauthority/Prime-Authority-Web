<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Prime Authority</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="modal.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: #080810;
            color: #fff;
            min-height: 100vh;
        }
        
        .container {
            display: flex;
            min-height: 100vh;
        }
        
        /* ── SIDEBAR ─────────────────────────── */
        .sidebar {
            width: 220px;
            background: #0a0a14;
            border-right: 1px solid #13131f;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            transition: width 0.25s;
            overflow: hidden;
            position: relative;
            z-index: 100;
        }
        
        .sidebar.collapsed {
            width: 64px;
        }
        
        .sidebar-header {
            padding: 18px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid #13131f;
            justify-content: space-between;
        }
        
        .sidebar.collapsed .sidebar-header {
            justify-content: center;
            padding: 18px 0;
        }
        
        .pa-logo {
            width: 36px;
            height: 36px;
            background: rgba(220, 38, 38, 0.2);
            border: 2px solid #dc2626;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            color: #dc2626;
            font-size: 16px;
        }
        
        .logo-text {
            display: flex;
            flex-direction: column;
            line-height: 1.1;
        }
        
        .logo-text p {
            color: #dc2626;
            font-weight: 900;
            font-size: 12px;
            letter-spacing: 1px;
        }
        
        .collapse-btn {
            background: none;
            border: none;
            color: #555;
            cursor: pointer;
            padding: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .sidebar.collapsed .collapse-btn {
            display: none;
        }
        
        nav {
            flex: 1;
            padding: 12px 0;
            overflow-y: auto;
        }
        
        nav button {
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
            padding: 12px 20px;
            background: transparent;
            border: none;
            border-left: 3px solid transparent;
            color: #666;
            cursor: pointer;
            transition: 0.15s;
            font-family: 'Poppins', sans-serif;
            font-size: 13px;
            font-weight: 400;
            white-space: nowrap;
            text-align: left;
        }
        
        .sidebar.collapsed nav button {
            padding: 13px 0;
            justify-content: center;
        }
        
        nav button:hover {
            background: rgba(220, 38, 38, 0.08);
        }
        
        nav button.active {
            background: rgba(220, 38, 38, 0.15);
            border-left-color: #dc2626;
            color: #dc2626;
            font-weight: 700;
        }
        
        nav svg {
            flex-shrink: 0;
        }
        
        .sidebar.collapsed nav span:not(svg) {
            display: none;
        }
        
        .logout-btn {
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
            padding: 14px 20px;
            background: none;
            border: none;
            border-top: 1px solid #13131f;
            color: #dc2626;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            font-size: 13px;
            font-weight: 700;
            text-align: left;
        }
        
        .sidebar.collapsed .logout-btn {
            justify-content: center;
            padding: 14px 0;
        }
        
        .sidebar-footer {
            padding: 16px 20px;
            border-top: 1px solid #13131f;
            text-align: center;
        }
        
        .sidebar.collapsed .sidebar-footer {
            display: none;
        }
        
        .sidebar-footer p {
            color: #333;
            font-size: 9px;
            letter-spacing: 1px;
            margin-top: 6px;
        }
        
        .sidebar-footer p:last-child {
            color: #2a2a2a;
            font-size: 8px;
            letter-spacing: 0.5px;
        }
        
        /* ── RIGHT SIDE ──────────────────────── */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }
        
        /* ── TOPBAR ─────────────────────────── */
        .topbar {
            background: #0a0a14;
            border-bottom: 1px solid #13131f;
            padding: 0 24px;
            height: 60px;
            display: flex;
            align-items: center;
            gap: 16px;
            flex-shrink: 0;
        }
        
        .menu-btn {
            background: none;
            border: none;
            color: #666;
            cursor: pointer;
            display: flex;
            padding: 4px;
            flex-shrink: 0;
        }
        
        .search-wrapper {
            flex: 1;
            max-width: 400px;
            position: relative;
        }
        
        .search-wrapper input {
            width: 100%;
            padding: 10px 14px 10px 40px;
            background: #0f0f1a;
            border: 1px solid #1e1e2e;
            border-radius: 24px;
            color: #fff;
            font-size: 13px;
            font-family: 'Poppins', sans-serif;
            outline: none;
        }
        
        .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #444;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .spacer {
            flex: 1;
        }
        
        .date-display {
            color: #555;
            font-size: 12px;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .bell-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: #888;
            position: relative;
            display: flex;
            padding: 6px;
            align-items: center;
            justify-content: center;
        }
        
        .notification-badge {
            position: absolute;
            top: 2px;
            right: 2px;
            background: #dc2626;
            color: #fff;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            font-size: 9px;
            font-weight: 900;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .profile-card {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            padding: 6px 10px;
            border-radius: 10px;
            background: #0f0f1a;
            border: 1px solid #1e1e2e;
        }
        
        .profile-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: rgba(220, 38, 38, 0.2);
            border: 2px solid #dc2626;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #dc2626;
        }
        
        .profile-info {
            line-height: 1.3;
        }
        
        .profile-info p:first-child {
            color: #fff;
            font-size: 12px;
            font-weight: 700;
        }
        
        .profile-info p:last-child {
            color: #666;
            font-size: 10px;
        }
        
        /* ── CONTENT ────────────────────────── */
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 28px 28px 40px;
        }
        
        .content-header {
            margin-bottom: 26px;
        }
        
        .content-header h1 {
            color: #fff;
            font-weight: 900;
            font-size: 22px;
            margin-bottom: 4px;
        }
        
        .content-header p {
            color: #555;
            font-size: 13px;
        }
        
        /* ── STATS ROW ──────────────────────── */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 14px;
            margin-bottom: 26px;
        }
        
        .stat-card {
            background: #0f0f1a;
            border: 1px solid;
            border-radius: 12px;
            padding: 18px 16px;
            display: flex;
            align-items: center;
            gap: 14px;
        }
        
        .stat-icon {
            width: 44px;
            height: 44px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }
        
        .stat-value {
            font-size: 22px;
            font-weight: 900;
        }
        
        .stat-label {
            color: #555;
            font-size: 11px;
        }
        
        /* ── CARD ───────────────────────────── */
        .card {
            background: #0f0f1a;
            border: 1px solid #1e1e2e;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
        }
        
        .card h3 {
            color: #aaa;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 12px;
        }
        
        .card h2 {
            color: #fff;
            font-weight: 900;
            font-size: 20px;
            margin-bottom: 4px;
        }
        
        .card-desc {
            color: #555;
            font-size: 13px;
            margin-bottom: 14px;
        }
        
        /* ── TABLE ──────────────────────────── */
        .table-wrapper {
            overflow-x: auto;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        
        thead tr {
            border-bottom: 1px solid #1e1e2e;
        }
        
        th {
            padding: 10px 14px;
            color: #555;
            font-weight: 600;
            text-align: left;
            white-space: nowrap;
        }
        
        tbody tr {
            border-bottom: 1px solid #13131f;
        }
        
        tbody tr:nth-child(even) {
            background: rgba(255, 255, 255, 0.01);
        }
        
        td {
            padding: 10px 14px;
            color: #aaa;
        }
        
        td strong {
            color: #e0e0e0;
            font-weight: 600;
        }
        
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 7px;
            cursor: pointer;
            font-weight: 700;
            font-size: 12px;
            font-family: 'Poppins', sans-serif;
            transition: opacity 0.2s;
        }
        
        .btn-primary {
            background: #dc2626;
            color: #fff;
        }
        
        .btn-primary:hover {
            opacity: 0.9;
        }
        
        .btn-secondary {
            background: transparent;
            border: 1px solid #2a2a3a;
            color: #888;
        }
        
        .badge {
            border-radius: 20px;
            padding: 2px 10px;
            font-size: 11px;
            font-weight: 700;
            white-space: nowrap;
            display: inline-block;
        }
        
        .badge-pending {
            background: rgba(245, 158, 11, 0.15);
            color: #f59e0b;
        }
        
        .badge-accepted {
            background: rgba(34, 197, 94, 0.15);
            color: #22c55e;
        }
        
        .badge-rejected {
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
        }
        
        /* ── MODAL ──────────────────────────── */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            z-index: 9999;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .modal.show {
            display: flex;
        }
        
        .modal-content {
            background: #0f0f1a;
            border: 1px solid #2a2a3a;
            border-radius: 16px;
            width: 100%;
            max-width: 640px;
            max-height: 90vh;
            overflow-y: auto;
            padding: 28px;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
        }
        
        .modal-header h2 {
            color: #dc2626;
            font-weight: 900;
            font-size: 18px;
            margin-bottom: 6px;
        }
        
        .modal-header .info {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .modal-header .info span {
            color: #666;
            font-size: 12px;
        }
        
        .modal-image {
            width: 56px;
            height: 56px;
            border-radius: 10px;
            object-fit: cover;
            border: 1px solid #2a2a3a;
        }
        
        .fields-grid {
            display: grid;
            gap: 8px;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            margin-bottom: 20px;
        }
        
        .field {
            background: #0a0a14;
            border-radius: 8px;
            padding: 10px 14px;
        }
        
        .field-label {
            color: #555;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 3px;
        }
        
        .field-value {
            color: #ddd;
            font-size: 13px;
            word-break: break-all;
        }
        
        .modal-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }
        
        .modal-actions .btn {
            padding: 8px 16px;
        }
        
        .notification-section {
            background: #0a0a14;
            border: 1px solid #1e3a5f;
            border-radius: 10px;
            padding: 16px;
        }
        
        .notification-section p {
            color: #60a5fa;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 10px;
        }
        
        textarea {
            width: 100%;
            padding: 10px 14px;
            background: #0f0f1a;
            border: 1px solid #1e3a5f;
            border-radius: 8px;
            color: #fff;
            font-size: 13px;
            font-family: 'Poppins', sans-serif;
            resize: vertical;
            margin-bottom: 10px;
            outline: none;
        }
        
        select {
            padding: 8px 16px;
            background: #0f0f1a;
            border: 1px solid #2a2a3a;
            border-radius: 24px;
            color: #fff;
            font-size: 13px;
            font-family: 'Poppins', sans-serif;
            cursor: pointer;
            outline: none;
        }
        
        option {
            background: #0a0a14;
            color: #fff;
        }
        
        /* ── TABS ───────────────────────────── */
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        .filter-wrapper {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 12px;
        }
        
        .filter-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        
        /* ── FOOTER ─────────────────────────── */
        footer {
            border-top: 1px solid #13131f;
            padding: 12px 28px;
            text-align: center;
            font-size: 11px;
            color: #333;
        }
        
        .no-entries {
            color: #444;
            font-size: 13px;
            padding: 20px 0;
        }
        
        @media (max-width: 768px) {
            .sidebar {
                width: 64px;
            }
            .logo-text,
            .collapse-btn {
                display: none;
            }
            .stats-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- SIDEBAR -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div style="display: flex; align-items: center; gap: 10px;">
                    <div class="pa-logo">PA</div>
                    <div class="logo-text">
                        <p>PRIME</p>
                        <p>AUTHORITY</p>
                    </div>
                </div>
                <button class="collapse-btn" onclick="toggleSidebar()" title="Collapse">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M11 17l-5-5 5-5M18 17l-5-5 5-5"></path>
                    </svg>
                </button>
            </div>
            
            <nav id="navItems"></nav>
            
            <button class="logout-btn" onclick="handleLogout()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"></path>
                </svg>
                <span>Logout</span>
            </button>
            
            <div class="sidebar-footer">
                <div class="pa-logo">PA</div>
                <p>PRIME AUTHORITY</p>
                <p>WHERE CHAMPIONS ARE MADE.</p>
            </div>
        </aside>
        
        <!-- MAIN CONTENT -->
        <div class="main-content">
            <!-- TOPBAR -->
            <header class="topbar">
                <button class="menu-btn" onclick="toggleSidebar()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="3" y1="12" x2="21" y2="12"></line>
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <line x1="3" y1="18" x2="21" y2="18"></line>
                    </svg>
                </button>
                
                <div class="search-wrapper">
                    <div class="search-icon">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.35-4.35"></path>
                        </svg>
                    </div>
                    <input type="text" id="searchInput" placeholder="Search entries…">
                </div>
                
                <div class="spacer"></div>
                
                <div class="date-display" id="dateDisplay"></div>
                
                <button class="bell-btn" onclick="switchTab('notifications')">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 0 1-3.46 0"></path>
                    </svg>
                    <div class="notification-badge" id="notifBadge" style="display: none;">0</div>
                </button>
                
                <div class="profile-card">
                    <div class="profile-avatar">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2M12 3a4 4 0 1 0 0 8 4 4 0 0 0 0-8z"></path>
                        </svg>
                    </div>
                    <div class="profile-info">
                        <p>Admin</p>
                        <p>Super Administrator</p>
                    </div>
                </div>
            </header>
            
            <!-- CONTENT AREA -->
            <main class="content" id="contentArea"></main>
            
            <!-- FOOTER -->
            <footer>
                <p>© 2024 PRIME AUTHORITY. All rights reserved.</p>
            </footer>
        </div>
    </div>
    
    <!-- MODAL FOR ENTRY DETAILS -->
    <div class="modal" id="entryModal">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-header">
                <div>
                    <h2 id="modalTitle">Entry Details</h2>
                    <div class="info">
                        <span class="badge" id="modalStatus"></span>
                        <span id="modalEmail"></span>
                    </div>
                </div>
                <img id="modalImage" class="modal-image" style="display: none;">
            </div>
            
            <div class="fields-grid" id="modalFields"></div>
            
            <div class="modal-actions" id="modalActions"></div>
            
            <div class="notification-section">
                <p>📩 Send Personal Notification</p>
                <textarea id="notifMessage" placeholder="Type a message for this user…" rows="3"></textarea>
                <div style="display: flex; gap: 10px;">
                    <button class="btn btn-primary" onclick="sendPersonalNotif()">📤 Send</button>
                    <button class="btn btn-secondary" onclick="closeModal()">Close</button>
                </div>
            </div>
        </div>
    </div>
    
    <script src="firebase.js"></script>
    <script src="modal.js"></script>
    <script src="admin-panel.js"></script>
</body>
</html>
